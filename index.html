<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Delirium Prototype</title>
<style>
body{font-family:Arial;margin:0;padding:20px;background:#f5f7fb}
.view{display:none}
.view.active{display:block}
button{padding:12px 16px;margin-top:10px;cursor:pointer}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
</style>
</head>
<body>

<div id="home" class="view active">
  <div class="card">
    <h2>Caregiver Portal</h2>
    <button onclick="startCheckIn()">Start Check-in</button>
  </div>
</div>

<div id="step1" class="view">
  <div class="card">
    <h3>Did confusion start suddenly?</h3>
    <button onclick="nextStep()">Yes</button>
    <button onclick="nextStep()">No</button>
  </div>
</div>

<div id="step2" class="view">
  <div class="card">
    <h3>Attention worse than usual?</h3>
    <button onclick="nextStep2()">Yes</button>
    <button onclick="nextStep2()">No</button>
  </div>
</div>

<div id="result" class="view">
  <div class="card">
    <h2>Check-in Complete</h2>
    <p>Results displayed here</p>
    <button onclick="restart()">New Check-in</button>
  </div>
</div>

<script>
function show(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startCheckIn(){
  show('step1');
}

function nextStep(){
  show('step2');
}

function nextStep2(){
  show('result');
}

function restart(){
  show('home');
}
</script>

</body>
</html>
